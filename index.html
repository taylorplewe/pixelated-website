<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pixel website</title>
<link rel="icon" href="putnam.png" />

<style>
    @import url("https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap");
    @import url("https://fonts.googleapis.com/css2?family=Metamorphous&display=swap");
    :root {
        --col-bg: #222120;
        --col-form: hsl(from var(--col-bg) h s calc(l + 4));
        --col-form-hilite: hsl(from var(--col-form) h s calc(l + 4));
        --col-text-faint: #888;
        --col-brand: #66c;
        --col-brand-hover: hsl(from var(--col-brand) h s calc(l + 16));

        --padding-form: 6px 8px;

        font-size: 11px;
        /*font-family: Grenze, serif;*/
        /*font-family: UnifrakturMaguntia;*/
        font-family: Metamorphous;
        letter-spacing: 0.1rem;
    }
    #drawEl {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        text-align: center;
        background-color: #0008;

        display: grid;
        grid-template-columns: 1fr 5fr 1fr;
    }
    h1,
    p {
        margin: 0;
    }
    body,
    input,
    button,
    a {
        cursor: none;
        letter-spacing: inherit;
        font-family: inherit;
        font-size: inherit;
        color: inherit;
    }
    body {
        background-color: var(--col-bg);
        color: #eee;
        margin: 0;
        overflow: hidden;
    }
    #main-and-footer {
        padding: 12px 0;
        display: flex;
        flex-direction: column;
        grid-column-start: 2;
        background-color: var(--col-bg);
    }
    main {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }
    footer {
        color: var(--col-text-faint);
    }
    canvas {
        transform: scale(4);
        transform-origin: top left;
        width: round(calc(100vw / 4), 1px);
        height: round(calc(100vh / 4), 1px);
        box-sizing: border-box;
        image-rendering: pixelated;
        -webkit-font-smoothing: none;
        background-image: url("astoria.png");
    }
    h1 {
        font-size: 24px;
        font-family: UnifrakturMaguntia;
    }
    button {
        border: none;
        border-radius: 4px;
        padding: var(--padding-form);

        transition: background-color 0.2s ease;
        background-color: var(--col-form);
        &:hover {
            background-color: var(--col-form-hilite);
        }
    }
    p {
        color: var(--col-text-faint);
    }
    a {
        text-decoration: none;

        transition: color 0.2s ease;
        color: var(--col-brand);
        &:hover {
            color: var(--col-brand-hover);
        }
    }
    input[type="text"] {
        border: none;
        border-bottom: 1px solid var(--col-form);
        border-radius: 4px;
        padding: var(--padding-form);

        transition:
            background-color 0.2s ease,
            border-color 0.2s ease;
        background-color: transparent;
        &:hover {
            background-color: var(--col-form);
            border-color: var(--col-form-hilite);
        }
        &:focus-visible {
            outline: 1px solid white;
        }
    }
    .input-with-label {
        align-self: center;
        position: relative;
        display: flex;
        align-items: center;
    }
    label[for="range-input"] {
        position: absolute;
        right: 0;
        translate: calc(100% + 4px);
    }
    #no-support-msg {
        font-size: 12pt;
        position: absolute;
        top: 50%;
        left: 50%;
        translate: -50% -50%;
        text-align: center;
        color: white;
        cursor: initial;
        & > a {
            cursor: revert;
        }
    }
</style>

<p id="no-support-msg" style="display: none">
    HTML-in-Canvas API is not supported by your browser.
    <br />
    Make sure you're using
    <a href="https://www.google.com/chrome/canary/" target="_blank">Chrome Canary</a> and have the HTML-in-Canvas API
    feature flag enabled (<code>chrome://flags/#canvas-draw-element</code>).
</p>
<canvas layoutsubtree>
    <div id="drawEl">
        <div id="main-and-footer">
            <main>
                <h1>Hello</h1>
                <p>I am an HTML &lt;p&gt; tag</p>
                <div>
                    <input type="text" />
                    <button command="show-modal" commandfor="test-modal">Click me</button>
                </div>
                <div class="input-with-label">
                    <input id="range-input" type="range" />
                    <label for="range-input"></label>
                </div>
            </main>
            <footer>
                Check out the <a href="https://github.com/taylorplewe/pixelated-website" target="_blank">source code</a>
            </footer>
        </div>
        <dialog id="test-modal" closedby="any">
            <form method="dialog">
                <p>Amaze amaze amaze!</p>
                <button>Okay</button>
            </form>
        </dialog>
    </div>
</canvas>

<script>
    const cursorImgEl = new Image();
    cursorImgEl.src = "./aoe2cursor.png";
    let cursorX = 0;
    let cursorY = 0;

    const canvas = document.querySelector("canvas");
    const ctx = canvas.getContext("2d");

    if (canvas.requestPaint === undefined) {
        console.error("HTML-in-Canvas API not supported!");
        document.getElementById("no-support-msg").style.display = "block";
        canvas.style.display = "none";
    }

    canvas.onpaint = (e) => {
        ctx.reset();
        let transform = ctx.drawElementImage(drawEl, 0, 0);
        drawEl.style.transform = transform.toString();
        ctx.drawImage(cursorImgEl, cursorX, cursorY);
    };
    canvas.requestPaint();

    canvas.onpointerdown = (e) => {
        canvas.setPointerCapture(e.pointerId);
    };
    canvas.addEventListener("mousemove", (e) => {
        cursorX = Math.floor(e.clientX / 4);
        cursorY = Math.floor(e.clientY / 4);
        canvas.requestPaint();
    });

    const observer = new ResizeObserver(([entry]) => {
        canvas.width = entry.devicePixelContentBoxSize[0].inlineSize;
        canvas.height = entry.devicePixelContentBoxSize[0].blockSize;
    });
    observer.observe(canvas, { box: "device-pixel-content-box" });

    const rangeInputEl = document.querySelector("#range-input");
    const updateRangeInputLabel = (val) => {
        const label = document.querySelector("#range-input + label");
        label.textContent = val + "%";
    };
    updateRangeInputLabel(rangeInputEl.value);
    rangeInputEl.oninput = (e) => updateRangeInputLabel(e.target.value);
</script>
